###################### Display Order ########################
isDefaultOrder=true

######################  Common     ##########################
com. {
date.format=dd.MM.yyyy
datetime.format=dd.MM.yyyy HH:mm:ss
joda.format=yyyy-MM-dd'T'HH:mm:ss.SSS
#hour.minutes=hh:mm a
hour.minutes=HH:mm
#decimal.format=###,###0.##
decimal.format=###,##0.00
#percentage.format=##0.##
percentage.format=##0.00
quantity.format=##0.##
boolean.true.format=Ja
boolean.false.format=Nein
boolean.combo= {
true=Ja
false=Nein
}
}

pagination.keys. {
ctrlKeys=^n^p
key.nextPage=C+N
key.previewsPage=C+P
}

bandbox.keys. {
ctrlKeys=^e
key.first.field.focus=C+E
}

######################  ERROR POPUP CONFIG     ##########################
error.popup.config= {
base
}

#screen id, Return code, popup title, poip image, Solve Introduction
error.popup.base= {
NULL,        1, Operation Declined, ~./zul/img/msgbox/stop-btn.png, Bitte korrigieren Sie Ihre Eingabe und wiederholen Sie dann die gewünschte Aktion.
NULL,        2, Interface Protocol, ~./zul/img/msgbox/stop-btn.png, Möglicherweise ist das Programm nicht ordnungsgemäß installiert. Bitte kontaktieren Sie Ihr Support-Team.
NULL,        3, Parameter Error,    ~./zul/img/msgbox/stop-btn.png, Bitte korrigieren Sie Ihre Eingabe und wiederholen Sie dann die gewünschte Aktion.
country_zul, 3, Parameter Error,    ~./zul/img/msgbox/stop-btn.png, Bitte korrigieren Sie Ihre Ländereingabe und wiederholen Sie dann die gewünschte Aktion.
NULL,        4, Timeout Error,      ~./zul/img/msgbox/stop-btn.png, Zeitüberschreitung aufgrund hoher Systemlast. Bitte wiederholen Sie die gewünschte Aktion.
NULL,        5, Error,              ~./zul/img/msgbox/stop-btn.png, NULL
NULL,        6, Error,              ~./zul/img/msgbox/stop-btn.png, NULL
NULL,        7, Error,              ~./zul/img/msgbox/stop-btn.png, NULL
NULL,        8, Internal Error,     ~./zul/img/msgbox/stop-btn.png, Bitte kontaktieren Sie Ihren Systemadministrator.
NULL,        9, Out of Resources,   ~./zul/img/msgbox/stop-btn.png, Bitte kontaktieren Sie Ihren Systemadministrator.
}
