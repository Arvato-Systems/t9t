###################### Display Order ########################
isDefaultOrder=false

######################  Common     ##########################
com. {
date.format=dd/MM/yyyy
datetime.format=dd/MM/yyyy HH:mm:ss
joda.format=yyyy-MM-dd'T'HH:mm:ss.SSS
#hour.minutes=hh:mm a
hour.minutes=HH:mm
#decimal.format=###,###0.##
decimal.format=###,##0.00
#percentage.format=##0.##
percentage.format=##0.00
quantity.format=##0.##
boolean.true.format=Yes
boolean.false.format=No
boolean.combo= {
true=True
false=False
}
}

pagination.keys. {
ctrlKeys=^n^p
key.nextPage = C+N
key.previewsPage = C+P
}

bandbox.keys. {
ctrlKeys=^e
key.first.field.focus = C+E
}


######################  ERROR POPUP CONFIG     ##########################
