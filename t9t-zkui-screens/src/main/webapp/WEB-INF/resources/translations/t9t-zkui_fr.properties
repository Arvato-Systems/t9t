###################### Display Order ########################
isDefaultOrder=true

######################  Common     ##########################
com. {

date.format=dd/MM/yyyy
datetime.format=dd/MM/yyyy HH:mm:ss
joda.format=yyyy-MM-dd'T'HH:mm:ss.SSS
#hour.minutes=hh:mm a
hour.minutes=HH:mm
#decimal.format=###,###0.##
decimal.format=###,##0.00
#percentage.format=##0.##
percentage.format=##0.00
quantity.format=##0.##
boolean.true.format=Oui
boolean.false.format=Non

boolean.combo= {
true=VRAI
false=FAUX
}
}
pagination.keys. {
ctrlKeys=^n^p
key.nextPage = C+N
key.previewsPage = C+P
}

bandbox.keys. {
ctrlKeys=^e
key.first.field.focus = C+E
}

######################  ERROR POPUP CONFIG     ##########################
error.popup.config= {
base
}

#screen id, Return code, popup title, poip image, Solve Introduction
error.popup.base= {
NULL,        1, Opération refusée,  ~./zul/img/msgbox/stop-btn.png, Veuillez vérifier vos saisies et soumettre à nouveau votre demande.
NULL,        2, Protocole d'interface, ~./zul/img/msgbox/stop-btn.png, Un déploiement incohérent a probablement été effectué. Veuillez contacter le support de deuxième niveau.
NULL,        3, Erreur de paramètre, ~./zul/img/msgbox/stop-btn.png, Veuillez vérifier vos saisies et soumettre à nouveau votre demande.
country_zul, 3, Erreur de paramètre, ~./zul/img/msgbox/stop-btn.png, Veuillez vérifier les saisies de pays et soumettre à nouveau votre demande.
NULL,        4, Erreur de délai,    ~./zul/img/msgbox/stop-btn.png, Un service distant est peut-être surchargé. Veuillez réessayer.
NULL,        5, Erreur,             ~./zul/img/msgbox/stop-btn.png, NULL
NULL,        6, Erreur,             ~./zul/img/msgbox/stop-btn.png, NULL
NULL,        7, Erreur,             ~./zul/img/msgbox/stop-btn.png, NULL
NULL,        8, Erreur interne,     ~./zul/img/msgbox/stop-btn.png, Veuillez contacter votre intégrateur système pour résoudre ce problème.
NULL,        9, Ressources insuffisantes, ~./zul/img/msgbox/stop-btn.png, Veuillez contacter le support de premier niveau pour obtenir de l'aide.
}
